version: '3.8'\n\nservices:\n  flask_app:\n    image: flask_app_image\n    build: .\n    ports:\n      - '5000:5000'\n    depends_on:\n      - postgres\n      - mongo\n      - elasticsearch\n      - redis\n      - neo4j\n    environment:\n      DATABASE_URL: 'postgresql://user:password@postgres:5432/db_name'\n\n  postgres:\n    image: postgres:latest\n    restart: always\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: db_name\n    networks:\n      - backend\n\n  mongo:\n    image: mongo:latest\n    restart: always\n    networks:\n      - backend\n\n  elasticsearch:\n    image: elasticsearch:7.10.1\n    restart: always\n    environment:\n      - discovery.type=single-node\n    networks:\n      - backend\n\n  redis:\n    image: redis:latest\n    restart: always\n    networks:\n      - backend\n\n  neo4j:\n    image: neo4j:latest\n    restart: always\n    environment:\n      NEO4J_AUTH: 'neo4j/password'\n    networks:\n      - backend\n\nnetworks:\n  backend:\n    driver: bridge\n